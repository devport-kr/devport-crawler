name: Build & Deploy to AWS Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: devport-prod-crawler
  LAMBDA_FUNCTIONS: devport-prod-crawler-api devport-prod-crawler-playwright devport-prod-port_sync

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags

      - name: Deploy to Lambda
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          for fn in ${{ env.LAMBDA_FUNCTIONS }}; do
            echo "Updating $fn..."
            aws lambda update-function-code \
              --function-name "$fn" \
              --image-uri "$IMAGE_URI" \
              > /dev/null
          done
          for fn in ${{ env.LAMBDA_FUNCTIONS }}; do
            aws lambda wait function-updated --function-name "$fn"
            echo "Deployed $fn"
          done
